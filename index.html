<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashLocal - Live nearby deals</title>
    <meta name="description" content="Find last-minute local deals nearby. Open now, ending soon, ready to redeem." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlashLocal" />
    <meta property="og:title" content="FlashLocal - Live nearby deals" />
    <meta property="og:description" content="Find last-minute local deals nearby. Open now, ending soon, ready to redeem." />
    <meta property="og:url" content="https://flashlocal-six.vercel.app/" />
    <meta property="og:image" content="https://flashlocal-six.vercel.app/whatsapp-preview.png" />
    <meta property="og:image:secure_url" content="https://flashlocal-six.vercel.app/whatsapp-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FlashLocal preview showing live local deals nearby." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlashLocal - Live nearby deals" />
    <meta name="twitter:description" content="Find last-minute local deals nearby. Open now, ending soon, ready to redeem." />
    <meta name="twitter:image" content="https://flashlocal-six.vercel.app/whatsapp-preview.png" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Live nearby deals</p>
          <h1>FlashLocal</h1>
        </div>
        <div class="header-actions">
          <a class="nav-link" href="./how-it-works.html">Info</a>
          <button class="icon-button" id="languageToggle" aria-label="Switch language">IT</button>
        </div>
      </header>

      <main>
        <section class="launch-home">
          <div class="launch-copy">
            <p class="eyebrow" data-i18n="homeEyebrow">Last-minute local deals</p>
            <h2 data-i18n="homeTitle">Fill slow hours fast.</h2>
            <p data-i18n="homeCopy">Businesses post deals on WhatsApp. Nearby customers find them instantly.</p>
            <div class="home-actions" aria-label="Primary paths">
              <button id="browseDeals" data-i18n="browseDeals">See deals</button>
              <a href="./how-it-works.html" data-i18n="howItWorks">For merchants</a>
            </div>
          </div>
          <div class="launch-proof" aria-label="Deal feed status">
            <span data-i18n="openNow">Open now</span>
            <strong><span id="liveCount">0</span> <span data-i18n="liveDeals">live deals</span></strong>
            <small data-i18n="endingSoonLabel">Sorted by distance and expiry.</small>
          </div>
        </section>

        <section class="location-band" aria-label="Location controls">
          <div>
            <span class="status-dot"></span>
            <span id="locationText" data-i18n="locationFallback">Milan, Porta Venezia</span>
          </div>
          <button id="useLocation" data-i18n="useLocation">Near me</button>
        </section>

        <nav class="category-strip" aria-label="Deal filters">
          <button class="chip active" data-category="all" data-i18n="all">All</button>
          <button class="chip" data-category="food" data-i18n="food">Food</button>
          <button class="chip" data-category="drinks" data-i18n="drinks">Drinks</button>
          <button class="chip" data-category="beauty" data-i18n="beauty">Beauty</button>
          <button class="chip" data-category="fitness" data-i18n="fitness">Fitness</button>
          <button class="chip" data-category="shopping" data-i18n="shopping">Shopping</button>
          <button class="chip" data-category="events" data-i18n="events">Events</button>
        </nav>

        <section class="controls-row">
          <div class="segmented" aria-label="View mode">
            <button class="active" data-view="list" data-i18n="list">List</button>
            <button data-view="map" data-i18n="map">Map</button>
          </div>
          <label class="select-label">
            <span data-i18n="sort">Sort</span>
            <select id="sortSelect">
              <option value="nearest" data-i18n="nearest">Nearest</option>
              <option value="ending" data-i18n="endingSoon">Ending soon</option>
              <option value="discount" data-i18n="biggest">Biggest discount</option>
              <option value="newest" data-i18n="newest">Newest</option>
            </select>
          </label>
        </section>

        <section id="dealList" class="deal-list" aria-label="Nearby deals"></section>

        <section id="mapView" class="map-view hidden" aria-label="Map view">
          <div class="map-canvas" id="mapCanvas"></div>
        </section>

      </main>
    </div>

    <template id="dealCardTemplate">
      <article class="deal-card">
        <img alt="" />
        <div class="deal-body">
          <div class="deal-topline">
            <span class="category"></span>
            <span class="distance"></span>
          </div>
          <h3></h3>
          <p class="business"></p>
          <p class="description"></p>
          <div class="deal-meta">
            <span class="discount"></span>
            <span class="expires"></span>
          </div>
          <div class="deal-actions">
            <button class="primary redeem" data-i18n="redeem">Get code</button>
            <button class="share" data-i18n="share">Share</button>
            <button class="directions" data-i18n="directions">Route</button>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
